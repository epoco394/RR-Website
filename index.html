<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R&R</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>
</head>
<body>
    <section id="landing">
        <nav class="nav">
            <div class="container nav__container">
                <div class="row nav__row">
                    <h1 class="nav__title">Rumination Rollercoaster</h1>
                    <ul class="nav__links">
                        <li class="nav__link">
                            <a href="#landing">Welcome</a>
                        </li>
                        <li class="nav__link">
                            <a href="#about">About</a>
                        </li>
                        <li class="nav__link">
                            <a href="#episodes">Episodes</a>
                        </li>
                        <li class="nav__link nav__link--primary">
                            <a href="#contact">Contact Me!</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <header>
            <div class="container header__container">
                <div class="row header__row">
                    <figure class="profile__img--wrapper">
                        <img src="./assets/RR profile photo.PNG" alt="" class="profile__img">
                    </figure>
                </div>
            </div>
        </header>
    </section>
   <main>
    <section id="about">
        <div class="container about__container">
            <div class="row about__row"></div>
        </div>
    </section>
    <section id="episodes">
        <div class="container episodes__container">
            <div class="row episodes__row"></div>
        </div>
    </section>
    <section id="contact">
        <div class="container contact__container">
            <div class="row contact__row"></div>
        </div>
    </section>
   </main>
   <footer></footer>
</body>
</html>
